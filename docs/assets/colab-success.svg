<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">PEFT Doctor Colab recipe validation</title>
  <desc id="desc">A notebook-style screenshot showing a Colab recipe validation command passing.</desc>
  <rect width="960" height="430" fill="#fff7ed"/>
  <rect x="42" y="34" width="876" height="362" rx="10" fill="#ffffff" stroke="#fdba74"/>
  <text x="72" y="82" fill="#9a3412" font-family="Consolas, Menlo, monospace" font-size="20">!peft-doctor recipe llama3-qlora-colab --copy ./my-run</text>
  <text x="72" y="124" fill="#9a3412" font-family="Consolas, Menlo, monospace" font-size="20">!peft-doctor validate-recipe ./my-run</text>
  <text x="72" y="184" fill="#166534" font-family="Consolas, Menlo, monospace" font-size="22">OK README.md found</text>
  <text x="72" y="222" fill="#166534" font-family="Consolas, Menlo, monospace" font-size="22">OK train.py found</text>
  <text x="72" y="260" fill="#166534" font-family="Consolas, Menlo, monospace" font-size="22">OK requirements.txt found</text>
  <text x="72" y="298" fill="#166534" font-family="Consolas, Menlo, monospace" font-size="22">OK sample_data.jsonl found</text>
  <text x="72" y="348" fill="#0f172a" font-family="Consolas, Menlo, monospace" font-size="22">Recipe ready for a GPU runtime.</text>
</svg>
